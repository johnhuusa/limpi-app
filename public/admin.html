<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Yalimpi</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #121212;
      color: #f2f2f2;
      margin: 0;
      padding: 32px 20px;
    }
    .header {
      max-width: 1200px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    .logo-row { display: flex; align-items: center; gap: 10px; }
    .logo-text { font-size: 18px; font-weight: 700; }
    .logo-text span { color: #0F9D8C; }
    h1 { font-size: 20px; margin: 0; font-weight: 700; }

    .stats { display: flex; gap: 12px; flex-wrap: wrap; }
    .stat {
      background: #1c1c1c;
      border: 1px solid #2c2c2c;
      border-radius: 8px;
      padding: 10px 16px;
      min-width: 90px;
    }
    .stat .num { font-size: 22px; font-weight: 700; }
    .stat .lbl { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat.requested .num { color: #e0574a; }
    .stat.assigned .num { color: #e0a63a; }
    .stat.completed .num { color: #3fd6c0; }

    .container { max-width: 1200px; margin: 0 auto; }

    .card {
      background: #1c1c1c;
      border: 1px solid #2c2c2c;
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 14px;
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }
    .card-id { font-size: 12px; color: #777; }
    .card-address { font-size: 16px; font-weight: 700; margin: 2px 0; }
    .card-meta { font-size: 13px; color: #aaa; line-height: 1.6; }
    .card-meta a { color: #3fd6c0; text-decoration: none; }
    .card-price { font-size: 20px; font-weight: 700; color: #3fd6c0; white-space: nowrap; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge.requested { background: #3b1a17; color: #e0574a; }
    .badge.assigned { background: #3b2f17; color: #e0a63a; }
    .badge.completed { background: #133b35; color: #3fd6c0; }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #2c2c2c;
    }
    .control-group { display: flex; flex-direction: column; gap: 4px; }
    .control-group label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    input, select {
      padding: 8px 10px;
      background: #141414;
      border: 1px solid #333;
      border-radius: 6px;
      color: #f2f2f2;
      font-size: 13px;
    }
    input:focus, select:focus { outline: none; border-color: #0F9D8C; }

    .photo-cell { display: flex; align-items: center; gap: 10px; }
    .photo-cell a {
      color: #3fd6c0;
      font-size: 13px;
      text-decoration: none;
    }
    .photo-thumb {
      width: 44px; height: 44px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #333;
    }
    input[type="file"] { font-size: 12px; max-width: 200px; }

    .special {
      margin-top: 10px;
      font-size: 13px;
      color: #ccc;
      background: #161616;
      border-left: 3px solid #0F9D8C;
      padding: 8px 12px;
      border-radius: 4px;
    }
    .empty { text-align: center; color: #777; padding: 60px 20px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-row">
      <svg width="30" height="30" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="30" fill="#0F9D8C"/>
        <path d="M30 14 L33.5 25 L44.5 28.5 L33.5 32 L30 43 L26.5 32 L15.5 28.5 L26.5 25 Z" fill="white"/>
        <circle cx="43" cy="15" r="3.2" fill="white" opacity="0.85"/>
      </svg>
      <div class="logo-text">ya<span>limpi</span> <span style="color:#777; font-weight:400;">admin</span></div>
    </div>
    <div class="stats" id="stats"></div>
  </div>

  <div class="container" id="cards"></div>

  <script>
    function formatCOP(amount) {
      return new Intl.NumberFormat('es-CO', {
        style: 'currency', currency: 'COP',
        minimumFractionDigits: 0, maximumFractionDigits: 0,
      }).format(amount);
    }

    function formatDateTime(dt) {
      if (!dt) return '—';
      return dt.replace('T', ' ');
    }

    function esc(s) {
      if (s === null || s === undefined) return '';
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    async function loadRequests() {
      const response = await fetch('/requests');
      const requests = await response.json();
      const cards = document.getElementById('cards');
      const stats = document.getElementById('stats');

      const counts = { requested: 0, assigned: 0, completed: 0 };
      requests.forEach(r => { counts[r.status] = (counts[r.status] || 0) + 1; });
      stats.innerHTML = `
        <div class="stat requested"><div class="num">${counts.requested}</div><div class="lbl">Requested</div></div>
        <div class="stat assigned"><div class="num">${counts.assigned}</div><div class="lbl">Assigned</div></div>
        <div class="stat completed"><div class="num">${counts.completed}</div><div class="lbl">Completed</div></div>
      `;

      if (requests.length === 0) {
        cards.innerHTML = '<div class="empty">No requests yet. / Aún no hay solicitudes.</div>';
        return;
      }

      cards.innerHTML = '';
      // newest first
      requests.slice().reverse().forEach(r => {
        const wa = (r.hostWhatsapp || '').replace(/[^0-9]/g, '');
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-top">
            <div>
              <div class="card-id">#${r.id} · <span class="badge ${r.status}">${r.status}</span></div>
              <div class="card-address">${esc(r.propertyAddress)}</div>
              <div class="card-meta">
                ${esc(r.propertyType)}${r.neighborhood ? ' · ' + esc(r.neighborhood) : ''}<br>
                <strong>${esc(r.hostName)}</strong>
                ${r.hostEmail ? ' · ' + esc(r.hostEmail) : ''}
                ${wa ? ` · <a href="https://wa.me/${wa}" target="_blank">WhatsApp ↗</a>` : ''}<br>
                Checkout: ${esc(formatDateTime(r.checkoutTime))} · Check-in: ${esc(formatDateTime(r.nextCheckinTime))}
              </div>
            </div>
            <div class="card-price">${formatCOP(r.totalPrice)}</div>
          </div>

          ${r.specialInstructions ? `<div class="special">${esc(r.specialInstructions)}</div>` : ''}

          <div class="controls">
            <div class="control-group">
              <label>Cleaner</label>
              <input type="text" value="${esc(r.assignedCleaner || '')}" data-id="${r.id}" class="cleanerInput" placeholder="Assign...">
            </div>
            <div class="control-group">
              <label>Status</label>
              <select data-id="${r.id}" class="statusSelect">
                <option value="requested" ${r.status === 'requested' ? 'selected' : ''}>Requested</option>
                <option value="assigned" ${r.status === 'assigned' ? 'selected' : ''}>Assigned</option>
                <option value="completed" ${r.status === 'completed' ? 'selected' : ''}>Completed</option>
              </select>
            </div>
            <div class="control-group">
              <label>Completion Photo</label>
              <div class="photo-cell">
                <input type="file" accept="image/*" data-id="${r.id}" class="photoInput">
                ${r.photoUrl ? `<img src="${esc(r.photoUrl)}" class="photo-thumb"><a href="${esc(r.photoUrl)}" target="_blank">View ↗</a>` : ''}
              </div>
            </div>
          </div>
        `;
        cards.appendChild(card);
      });

      document.querySelectorAll('.statusSelect').forEach(el => {
        el.addEventListener('change', (e) => updateRequest(e.target.dataset.id, { status: e.target.value }));
      });
      document.querySelectorAll('.cleanerInput').forEach(el => {
        el.addEventListener('change', (e) => updateRequest(e.target.dataset.id, { assignedCleaner: e.target.value }));
      });
      document.querySelectorAll('.photoInput').forEach(el => {
        el.addEventListener('change', (e) => uploadPhoto(e.target.dataset.id, e.target.files[0]));
      });
    }

    async function updateRequest(id, updates) {
      await fetch(`/requests/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(updates),
      });
      loadRequests();
    }

    async function uploadPhoto(id, file) {
      if (!file) return;
      const formData = new FormData();
      formData.append('photo', file);
      await fetch(`/requests/${id}/photo`, { method: 'POST', body: formData });
      loadRequests();
    }

    loadRequests();
  </script>
</body>
</html>
